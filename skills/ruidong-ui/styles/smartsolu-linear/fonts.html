<!--
  smartsolu-linear · 字体加载片段

  放在 index.html 的 <head> 里。
  同时把下面 <style> 块一起拷贝进去。
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">

<style>
  body {
    font-family: 'Plus Jakarta Sans', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    letter-spacing: -0.011em;
  }
  h1, h2, h3, h4, h5, h6 {
    letter-spacing: -0.025em;
  }
  .tabular-nums { font-variant-numeric: tabular-nums; }

  /* 细滚动条 —— 加到需要的容器上使用 className="custom-scrollbar" */
  .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
  .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
  .custom-scrollbar::-webkit-scrollbar-thumb { background: #cdd1dc; border-radius: 10px; }
  .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #b0b5c3; }
  .custom-scrollbar { scrollbar-width: thin; scrollbar-color: #cdd1dc transparent; }
</style>

<!--
  如果部署环境无法访问 Google Fonts（国内某些内网），
  把上面 <link> 三行替换为本地字体：
    - 下载 Plus Jakarta Sans Variable + Noto Sans SC woff2
    - 放到 /public/fonts/
    - 用 @font-face 在 <style> 中定义同名字族
-->
